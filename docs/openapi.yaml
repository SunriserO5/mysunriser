openapi: 3.0.3
info:
  title: Mysunriser Backend API
  version: 1.0.0
  description: OpenAPI spec generated from current controllers.
servers:
  - url: http://localhost:8080
paths:
  /api/health:
    get:
      summary: Health check
      description: Returns API and database health status.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/page:
    get:
      summary: List page items
      description: Returns a paged list of blog items.
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/blog:
    post:
      summary: Create or update post (legacy admin-only)
      description: |
        Legacy upsert endpoint retained for compatibility.
        Requires an admin bearer token.
        This endpoint maps to backend insertOrUpdate behavior.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
      responses:
        "200":
          description: Operation result text
          content:
            text/plain:
              schema:
                type: string
                example: Success!
        "400":
          description: Validation error or malformed request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/blog/{slug}:
    get:
      summary: Get post by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/posts/{slug}:
    put:
      summary: Update post as admin
      description: Updates editable detail fields for an existing post. Requires an admin bearer token.
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePostRequest"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/posts:
    post:
      summary: Create post as admin
      description: Creates a new post. Requires an admin bearer token and rejects duplicate slugs.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
      responses:
        "200":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "400":
          description: Validation error or duplicate slug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
        db:
          type: boolean
      required:
        - ok
        - db
    PageResponse:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/PageItem"
      required:
        - page
        - pageSize
        - items
    PageItem:
      type: object
      properties:
        slug:
          type: string
        title:
          type: string
        summary:
          type: string
        status:
          type: string
        publishAt:
          type: string
          format: date-time
    CreatePostRequest:
      type: object
      description: |
        Create payload for admin post creation and legacy /api/blog POST.
        Request field uses published_at, while read responses use publishAt.
      properties:
        slug:
          type: string
          maxLength: 128
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        title:
          type: string
          maxLength: 200
        content:
          type: string
        status:
          type: string
          maxLength: 20
          description: Post status such as draft or published.
        published_at:
          type: string
          format: date-time
          nullable: true
          description: Admin create stores null when omitted; legacy /api/blog POST defaults to current server time.
      required:
        - slug
        - title
        - content
        - status
    UpdatePostRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
        content:
          type: string
        status:
          type: string
          maxLength: 20
        published_at:
          type: string
          format: date-time
          nullable: true
      required:
        - title
        - content
        - status
    PostResponse:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        content:
          type: string
        status:
          type: string
        publishAt:
          type: string
          format: date-time
      required:
        - id
        - slug
        - title
        - content
        - status
        - publishAt
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: Business error code.
        message:
          type: string
        timeStamp:
          type: integer
          format: int64
      required:
        - code
        - message
        - timeStamp
