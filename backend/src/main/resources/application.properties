spring.application.name=backend
spring.flyway.enabled=true
auth.registration-enabled=${AUTH_REGISTRATION_ENABLED:false}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

jwt.secret=${JWT_SECRET}
jwt.expireMinutes=${JWT_EXPIRE_MINUTES:120}

turnstile.enabled=${TURNSTILE_ENABLED:false}
turnstile.site-key=${TURNSTILE_SITE_KEY:}
turnstile.secret-key=${TURNSTILE_SECRET_KEY:}

security.login.max-attempts=${LOGIN_MAX_ATTEMPTS:5}
security.login.window-seconds=${LOGIN_WINDOW_SECONDS:900}
